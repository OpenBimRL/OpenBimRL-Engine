# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
    push:
        branches:
            - main
            - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: ~/apt-cache
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/maven-publish.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Cache native build and ccache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/ccache
          ~/.cache/openbimrl/native/cmake
        key: native-engine-${{ hashFiles('Makefile', 'src/main/cpp/CMakeLists.txt', 'scripts/build-native.sh') }}-ios-eafa158
        restore-keys: |
          native-engine-

    - name: Install apt dependencies
      run: |
        mkdir -p ~/apt-cache
        echo "Dir::Cache::Archives \"$HOME/apt-cache\";" | sudo tee /etc/apt/apt.conf.d/99cache
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libboost-all-dev \
          xfonts-scalable \
          libocct-data-exchange-dev \
          libocct-draw-dev \
          libocct-foundation-dev \
          libocct-modeling-algorithms-dev \
          libocct-modeling-data-dev \
          libocct-ocaf-dev \
          libocct-visualization-dev \
          libmpfr-dev \
          libhdf5-dev \
          libgmp-dev \
          libxml2-dev \
          libeigen3-dev \
          clang \
          libomp-dev \
          cmake \
          ninja-build \
          ccache \
          make

    - uses: actions/checkout@v7
      with:
        submodules: 'true'

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }}

    - name: fetch API dependency
      run: |
        git clone --quiet https://github.com/RUB-Informatik-im-Bauwesen/OpenBimRL.git deps
        git -C deps checkout 83bd65f52803d7e86a464b592899c6709888c47a

    - name: install API dependency
      run: cd deps && mvn -Dproject.build.sourceEncoding=ISO-8859-1 compiler:compile jar:jar install:install -DgroupId=inf.bi.rub.de -DartifactId=OpenBIMRL-API -Dversion=2023.07.1 -Dpackaging=jar && cd .. && rm -rf deps

    - name: fetch and install BVH dependency
      run: |
        git clone --quiet https://github.com/RUB-Informatik-im-Bauwesen/Maven-Bounding-Volume-Hierarchy.git deps-bvh
        mvn -f deps-bvh/pom.xml install
        rm -rf deps-bvh

    - name: change version
      run: mvn versions:set -DnewVersion=$(date +"%Y").$(date +"%m").$(date +"%d") versions:commit

    - name: Build with Maven
      env:
        CC: /usr/bin/clang
        CXX: /usr/bin/clang++
        OPENBIMRL_NATIVE_CACHE_DIR: ${{ github.workspace }}/.cache/openbimrl/native
      run: mvn -B package --file pom.xml -Dmaven.test.skip

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
